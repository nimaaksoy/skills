name: Bug report
description: Something on the site or in a skill is broken
title: "[bug] "
labels: ["bug"]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
  - type: input
    id: url
    attributes:
      label: URL or skill path
      placeholder: "skills.nimaaksoy.com/skills/business/sales/cold-email-outreach"
