name: Deploy site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci || npm install

      - name: Build
        run: npm run build

      # ─── Cloudflare Pages (default) ───────────────────────────────
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.NIMA_CLOUDFLARE_TOKEN }}
          accountId: ${{ secrets.NIMA_CLOUDFLARE_ACCOUNT_ID }}
          projectName: skills-nimaaksoy-com
          directory: web/out
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          branch: main

